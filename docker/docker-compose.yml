services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: warehouse-operation-copilot-backend
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE: ""
    container_name: warehouse-operation-copilot-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
